<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Confusion Game</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
      padding: 20px;
    }

    .app-shell {
      width: 100%;
      max-width: 430px;
      aspect-ratio: 9 / 16;
      background: linear-gradient(180deg, #111827, #1e293b);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.08);
    }

    .video-intro {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      transition: 0.4s ease;
      padding: 24px;
      text-align: center;
    }

    .video-intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .demo-video {
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .play-button {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .play-button:hover {
      transform: scale(1.05);
    }

    .play-button::before {
      content: "";
      border-left: 28px solid white;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      margin-left: 6px;
    }

    .tutorial-text {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .start-btn {
      padding: 14px 24px;
      border-radius: 999px;
      border: none;
      background: white;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .countdown-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
    }

    .countdown-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .countdown-number {
      font-size: 120px;
      font-weight: bold;
      color: #3b82f6;
      animation: countdownPulse 1s ease;
    }

    @keyframes countdownPulse {
      0% {
        transform: scale(1.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: scale(0.8);
        opacity: 0;
      }
    }

    .game {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 22px;
      gap: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background: rgba(255,255,255,0.08);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13px;
      flex: 1;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .score-badge {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      min-width: 100px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .score-value {
      font-size: 28px;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .score-label {
      font-size: 12px;
      opacity: 0.9;
    }

    .title {
      text-align: center;
      margin-top: 10px;
    }

    .title h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .title p {
      font-size: 15px;
      opacity: 0.8;
      line-height: 1.6;
    }

    .challenge-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 26px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .word {
      font-size: 54px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .instruction {
      font-size: 16px;
      opacity: 0.85;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 14px;
      width: 100%;
    }

    .choice {
      border: none;
      border-radius: 18px;
      padding: 18px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.15s ease;
      position: relative;
    }

    .choice:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .choice:disabled {
      cursor: not-allowed;
    }

    .choice.correct {
      animation: correctPulse 0.6s ease;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.8), inset 0 0 20px rgba(34, 197, 94, 0.5);
    }

    .choice.wrong {
      animation: wrongShake 0.4s ease;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 20px rgba(239, 68, 68, 0.5);
    }

    @keyframes correctPulse {
      0% {
        box-shadow: 0 0 0 rgba(34, 197, 94, 0.8);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 30px rgba(34, 197, 94, 0.8);
        transform: scale(1.05);
      }
      100% {
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.8), inset 0 0 20px rgba(34, 197, 94, 0.5);
        transform: scale(1);
      }
    }

    @keyframes wrongShake {
      0%, 100% {
        transform: translateX(0) scale(1);
      }
      25% {
        transform: translateX(-8px) scale(0.98);
      }
      75% {
        transform: translateX(8px) scale(0.98);
      }
    }

    .flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: 0.3s ease;
    }

    .flash.correct {
      background: rgba(34,197,94,0.3);
      opacity: 1;
    }

    .flash.wrong {
      background: rgba(239,68,68,0.3);
      opacity: 1;
    }

    .round-indicator {
      font-size: 12px;
      opacity: 0.7;
    }

    @media (min-width: 900px) {
      body {
        padding: 40px;
      }

      .app-shell {
        max-width: 520px;
      }

      .title h1 {
        font-size: 40px;
      }

      .word {
        font-size: 70px;
      }

      .score-badge {
        min-width: 120px;
      }

      .score-value {
        font-size: 32px;
      }
    }

    @media (max-width: 480px) {
      .word {
        font-size: 46px;
      }

      .choice {
        font-size: 16px;
        padding: 16px;
      }

      .score-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="app-shell">

    <div class="flash" id="flash"></div>

    <div class="countdown-overlay" id="countdownOverlay">
      <div class="countdown-number" id="countdownNumber">3</div>
    </div>

    <div class="video-intro" id="intro">
      <div class="demo-video">
        <div class="play-button" id="playTutorial"></div>
      </div>

      <div class="tutorial-text">
        <h2 style="margin-bottom:12px;">Colour Confusion Tutorial</h2>
        <p>
          Press PLAY to watch an automated demo.
          <br><br>
          Then press START GAME to play for real!
        </p>
      </div>

      <button class="start-btn" id="startGameBtn">
        Start Game
      </button>
    </div>

    <div class="game">

      <div class="topbar">
        <div class="badge">
          <span id="roundIndicator" class="round-indicator">Round: 1/5</span>
        </div>

        <div class="score-badge">
          <span class="score-value" id="score">0</span>
          <span class="score-label">/100 Pts</span>
        </div>
      </div>

      <div class="title">
        <h1>Colour Confusion</h1>
        <p>
          Ignore the word meaning. Match the text colour.
        </p>
      </div>

      <div class="challenge-box">

        <div class="instruction">
          Which colour is the text displayed in?
        </div>

        <div class="word" id="wordDisplay">
          BLUE
        </div>

        <div class="choices" id="choices"></div>
      </div>

    </div>
  </div>

  <script>
    const colors = [
      { name: 'RED', value: '#ef4444' },
      { name: 'BLUE', value: '#3b82f6' },
      { name: 'GREEN', value: '#22c55e' },
      { name: 'YELLOW', value: '#eab308' },
      { name: 'PURPLE', value: '#a855f7' },
      { name: 'ORANGE', value: '#f97316' }
    ];

    const wordDisplay = document.getElementById('wordDisplay');
    const choicesContainer = document.getElementById('choices');
    const scoreDisplay = document.getElementById('score');
    const roundIndicator = document.getElementById('roundIndicator');
    const flash = document.getElementById('flash');

    const intro = document.getElementById('intro');
    const startGameBtn = document.getElementById('startGameBtn');
    const playTutorial = document.getElementById('playTutorial');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const countdownNumber = document.getElementById('countdownNumber');

    let currentAnswer = '';
    let score = 0;
    let round = 1;
    const MAX_ROUNDS = 5;
    const POINTS_PER_ROUND = 20;
    const MAX_SCORE = 100;
    let gameActive = true;
    let isDemo = false;

    playTutorial.addEventListener('click', () => {
      startDemo();
    });

    startGameBtn.addEventListener('click', () => {
      startCountdown();
    });

    function startDemo() {
      isDemo = true;
      score = 0;
      round = 1;
      gameActive = true;
      updateScore();
      updateRound();
      intro.classList.add('hidden');
      nextRound();
    }

    function startCountdown() {
      countdownOverlay.classList.add('active');
      let count = 3;

      const countdownInterval = setInterval(() => {
        countdownNumber.textContent = count;
        count--;

        if (count < 0) {
          clearInterval(countdownInterval);
          countdownOverlay.classList.remove('active');
          intro.classList.add('hidden');
          isDemo = false;
          startGame();
        }
      }, 1000);
    }

    function startGame() {
      score = 0;
      round = 1;
      gameActive = true;
      updateScore();
      updateRound();
      nextRound();
    }

    function nextRound() {
      if (round > MAX_ROUNDS || score >= MAX_SCORE) {
        endGame();
        return;
      }

      choicesContainer.innerHTML = '';

      const randomWord = colors[Math.floor(Math.random() * colors.length)];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];

      wordDisplay.textContent = randomWord.name;
      wordDisplay.style.color = randomColor.value;

      currentAnswer = randomColor.name;

      const shuffled = [...colors].sort(() => Math.random() - 0.5);

      shuffled.slice(0, 4).forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = item.name;
        btn.style.background = item.value;

        btn.addEventListener('click', () => {
          checkAnswer(item.name, btn);
        });

        choicesContainer.appendChild(btn);
      });

      const exists = [...choicesContainer.children].some(
        btn => btn.textContent === currentAnswer
      );

      if (!exists) {
        const randomIndex = Math.floor(Math.random() * 4);
        choicesContainer.children[randomIndex].textContent = currentAnswer;

        const correctColor = colors.find(c => c.name === currentAnswer);
        choicesContainer.children[randomIndex].style.background = correctColor.value;
      }

      // Auto-play demo
      if (isDemo) {
        disableAllButtons();
        setTimeout(() => {
          const correctButton = [...choicesContainer.querySelectorAll('.choice')].find(
            btn => btn.textContent === currentAnswer
          );
          if (correctButton) {
            autoClickButton(correctButton);
          }
        }, 1500);
      }
    }

    function disableAllButtons() {
      choicesContainer.querySelectorAll('.choice').forEach(btn => btn.disabled = true);
    }

    function enableAllButtons() {
      choicesContainer.querySelectorAll('.choice').forEach(btn => btn.disabled = false);
    }

    function autoClickButton(buttonElement) {
      const allButtons = choicesContainer.querySelectorAll('.choice');
      allButtons.forEach(btn => btn.disabled = true);

      score += POINTS_PER_ROUND;
      buttonElement.classList.add('correct');
      flashScreen('correct');

      updateScore();

      setTimeout(() => {
        round++;
        updateRound();
        nextRound();
      }, 800);
    }

    function checkAnswer(answer, buttonElement) {
      if (!gameActive || isDemo) return;

      gameActive = false;

      // Disable all buttons
      const allButtons = choicesContainer.querySelectorAll('.choice');
      allButtons.forEach(btn => btn.disabled = true);

      if (answer === currentAnswer) {
        score += POINTS_PER_ROUND;
        buttonElement.classList.add('correct');
        flashScreen('correct');
      } else {
        buttonElement.classList.add('wrong');
        flashScreen('wrong');
        
        // Show correct answer
        const correctButton = [...allButtons].find(btn => btn.textContent === currentAnswer);
        if (correctButton) {
          correctButton.classList.add('correct');
        }
      }

      updateScore();

      setTimeout(() => {
        round++;
        updateRound();
        gameActive = true;
        nextRound();
      }, 800);
    }

    function endGame() {
      gameActive = false;
      setTimeout(() => {
        if (isDemo) {
          alert(`Demo Complete! Now try the real game.`);
          intro.classList.remove('hidden');
          isDemo = false;
        } else {
          alert(`Game Complete! Your Final Score: ${score}/${MAX_SCORE}`);
          intro.classList.remove('hidden');
        }
      }, 200);
    }

    function updateScore() {
      scoreDisplay.textContent = score;
    }

    function updateRound() {
      roundIndicator.textContent = `Round: ${Math.min(round, MAX_ROUNDS + 1)}/${MAX_ROUNDS}`;
    }

    function flashScreen(type) {
      flash.className = `flash ${type}`;

      setTimeout(() => {
        flash.className = 'flash';
      }, 300);
    }
  </script>

</body>
</html>
